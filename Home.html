<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Team Selection</title>
<style>
:root{
  --green:#1b7f3b; --green-dark:#14622d; --red:#c0392b;
  --bg:#f4f6f8; --card:#ffffff; --line:#e2e6ea; --text:#1d2733; --muted:#667085;
  --radius:12px; --shadow:0 2px 10px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;margin:0;background:var(--bg);color:var(--text);line-height:1.45}
header{background:var(--green);color:#fff;padding:18px 16px}
header h1{margin:0;font-size:1.35rem}
main{max-width:960px;margin:0 auto;padding:16px}
section{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
h2{margin:0 0 12px;font-size:1.1rem}
label{font-weight:600;font-size:.9rem}

/* Buttons */
.btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:12px 18px;font-size:1rem;cursor:pointer;min-height:44px;transition:background .15s}
.btn:hover{background:var(--green-dark)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:#fff;color:var(--green);border:2px solid var(--green)}
.btn-outline:hover{background:#f0f7f2}
.btn-red{background:var(--red)} .btn-red:hover{filter:brightness(.9)}
.btn-row{display:flex;flex-wrap:wrap;gap:10px}

/* Inputs */
input[type=text],input[type=number],select{
  width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:1rem;background:#fff;min-height:44px
}
.field{margin-bottom:12px}

/* Player list */
.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:end;margin-bottom:12px}
.controls .field{flex:1;min-width:180px;margin:0}
.player-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.player{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}
.player input[type=checkbox]{width:20px;height:20px;flex:none}
.player .name{flex:1;font-weight:600}
.badge{background:#eef3f7;color:var(--muted);border-radius:20px;padding:3px 10px;font-size:.8rem;font-weight:600;white-space:nowrap}
.icon-btn{background:none;border:none;cursor:pointer;font-size:1.1rem;padding:4px;min-height:auto}
#message{font-weight:700;margin:12px 0 0;color:var(--green-dark)}

/* Results */
.team-block{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.team-card{border:1px solid var(--line);border-radius:10px;padding:12px}
.team-card h3{margin:0 0 6px;font-size:1rem}
.team-card .rating{color:var(--muted);font-size:.85rem}
.team-card .breakdown{color:var(--muted);font-size:.8rem;margin-top:4px}
.vs{text-align:center;font-weight:700;color:var(--muted)}
.diff{font-size:.85rem;color:var(--muted);margin-top:4px}
.copy-ok{color:var(--green-dark);font-weight:700;font-size:.85rem;margin-left:6px}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;padding:16px;overflow:auto}
.modal.open{display:flex;align-items:flex-start;justify-content:center}
.modal-content{background:#fff;border-radius:var(--radius);padding:20px;width:100%;max-width:420px;margin-top:5vh}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal-head h2{margin:0}
.close{background:none;border:none;font-size:1.8rem;line-height:1;cursor:pointer;color:var(--muted)}
.close:hover{color:#000}
.attr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

@media (max-width:520px){
  .team-block{grid-template-columns:1fr}
  .vs{display:none}
  .attr-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header><h1>⚽ Football Team Selection v1.1</h1></header>

<main>
  <!-- SELECT PLAYERS -->
  <section>
    <h2>Select Players</h2>
    <div class="controls">
      <div class="field">
        <label for="sortCriteria">Sort by</label>
        <select id="sortCriteria">
          <option value="nameAsc">Name (A–Z)</option>
          <option value="nameDesc">Name (Z–A)</option>
          <option value="ratingAsc">Rating (Low–High)</option>
          <option value="ratingDesc">Rating (High–Low)</option>
        </select>
      </div>
    </div>
    <div class="player-list" id="playerList"></div>
    <p id="message">Selected Players: 0</p>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn" id="createBtn">Create Balanced Teams</button>
      <button class="btn-outline btn" id="addBtn">Add Player</button>
    </div>
  </section>

  <!-- RESULTS -->
  <section>
    <h2>Team Results</h2>
    <div id="results"><p style="color:var(--muted)">No teams created yet.</p></div>
  </section>

   <!-- MANUAL ENTRY -->
  <section>
    <h2>Manual Team Entry</h2>
    <div class="field"><input type="text" id="manualTeam1" placeholder="Team 1 players, comma separated"></div>
    <div class="field"><input type="text" id="manualTeam2" placeholder="Team 2 players, comma separated"></div>
    <button class="btn" id="manualBtn">Build Teams From Manual Entry</button>
  </section>
  
  <!-- RATING CALCULATOR -->
  <section>
    <h2>Calculate Team Ratings</h2>
    <div class="field"><input type="text" id="team1Input" placeholder="Team 1 players, comma separated"></div>
    <div class="field"><input type="text" id="team2Input" placeholder="Team 2 players, comma separated"></div>
    <button class="btn" id="calcBtn">Calculate Ratings</button>
    <div id="teamRatings" style="margin-top:12px"></div>
  </section>

<!-- MANAGE PLAYERS -->
  <section>
    <h2>Manage Players</h2>
    <div class="btn-row">
      <button class="btn-outline btn" id="restoreBtn">Restore Default Players</button>
      <button class="btn-outline btn" id="exportBtn">Export Player Ratings</button>
    </div>
    <span id="exportMsg" class="copy-ok"></span>
  </section>

<!-- EDIT MODAL -->
<div class="modal" id="playerModal">
  <div class="modal-content">
    <div class="modal-head"><h2 id="playerName"></h2><button class="close" data-close="playerModal">&times;</button></div>
    <div class="attr-grid">
      <div class="field"><label>Goalkeeper</label><input type="number" id="goalkeeper" min="0" max="5"></div>
      <div class="field"><label>Defender</label><input type="number" id="defender" min="0" max="5"></div>
      <div class="field"><label>Midfielder</label><input type="number" id="midfielder" min="0" max="5"></div>
      <div class="field"><label>Forward</label><input type="number" id="forward" min="0" max="5"></div>
      <div class="field"><label>Running</label><input type="number" id="running" min="0" max="5"></div>
    </div>
    <div class="btn-row" style="margin-top:6px">
      <button class="btn" id="saveAttrBtn">Save</button>
      <button class="btn-red btn" id="removeBtn">Remove Player</button>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal" id="addPlayerModal">
  <div class="modal-content">
    <div class="modal-head"><h2>Add Player</h2><button class="close" data-close="addPlayerModal">&times;</button></div>
    <div class="field"><label>Name</label><input type="text" id="newPlayerName"></div>
    <div class="attr-grid">
      <div class="field"><label>Goalkeeper</label><input type="number" id="newGoalkeeper" min="0" max="5" value="3"></div>
      <div class="field"><label>Defender</label><input type="number" id="newDefender" min="0" max="5" value="3"></div>
      <div class="field"><label>Midfielder</label><input type="number" id="newMidfielder" min="0" max="5" value="3"></div>
      <div class="field"><label>Forward</label><input type="number" id="newForward" min="0" max="5" value="3"></div>
      <div class="field"><label>Running</label><input type="number" id="newRunning" min="0" max="5" value="3"></div>
    </div>
    <button class="btn" id="addPlayerBtn" style="margin-top:6px">Add Player</button>
  </div>
</div>

<script>
/* ---------- DEFAULT DATA ---------- */
const defaultPlayers = {
  "Alfie":{Goalkeeper:2,Defender:3,Midfielder:4,Forward:5,Running:4},
  "Ben":{Goalkeeper:3,Defender:5,Midfielder:4,Forward:4,Running:3},
  "Charlie":{Goalkeeper:3,Defender:3,Midfielder:4,Forward:3,Running:2},
  "Chris":{Goalkeeper:4,Defender:3,Midfielder:4,Forward:3,Running:3},
  "Craig":{Goalkeeper:2,Defender:3,Midfielder:3,Forward:2,Running:3},
  "Dan":{Goalkeeper:2,Defender:2,Midfielder:4,Forward:3,Running:2},
  "Darius":{Goalkeeper:2,Defender:3,Midfielder:3,Forward:3,Running:4},
  "Den":{Goalkeeper:3,Defender:4,Midfielder:5,Forward:3,Running:4},
  "Dunc":{Goalkeeper:2,Defender:2,Midfielder:3,Forward:4,Running:4},
  "Harry":{Goalkeeper:2,Defender:3,Midfielder:5,Forward:4,Running:4},
  "James":{Goalkeeper:3,Defender:2,Midfielder:4,Forward:3,Running:5},
  "Jason":{Goalkeeper:3,Defender:2,Midfielder:3,Forward:4,Running:4},
  "John":{Goalkeeper:3,Defender:3,Midfielder:4,Forward:3,Running:3},
  "Kirky":{Goalkeeper:5,Defender:4,Midfielder:3,Forward:2,Running:4},
  "Liam":{Goalkeeper:4,Defender:2,Midfielder:3,Forward:3,Running:3},
  "Liam F":{Goalkeeper:3,Defender:3,Midfielder:4,Forward:3,Running:3},
  "Matt":{Goalkeeper:2,Defender:3,Midfielder:4,Forward:5,Running:4},
  "Mike":{Goalkeeper:2,Defender:4,Midfielder:3,Forward:3,Running:4},
  "Ric":{Goalkeeper:2,Defender:2,Midfielder:3,Forward:2,Running:3},
  "Rob":{Goalkeeper:3,Defender:5,Midfielder:3,Forward:1,Running:5}
};

/* ---------- POSITION-AWARE BALANCING CONFIG ---------- */
/* Priority order (most → least important): Running, Goalkeeper, Forward, Defender, Midfielder.
   Each weight dwarfs the maximum possible contribution of all lower-priority attributes
   combined, so the optimiser balances Running first, then GK, etc., strictly. */
const ATTRS = ["Running","Goalkeeper","Forward","Defender","Midfielder"];
const ATTR_WEIGHTS = {
  Running:    10000,
  Goalkeeper:  1000,
  Forward:      100,
  Defender:      10,
  Midfielder:     1
};

/* Normalise: ensure TOTAL is computed */
function normalise(obj){
  Object.keys(obj).forEach(n=>{
    const p=obj[n];
    p.TOTAL=p.Goalkeeper+p.Defender+p.Midfielder+p.Forward+p.Running;
  });
  return obj;
}
function load(){
  const stored=JSON.parse(localStorage.getItem("players"));
  return normalise(stored || structuredClone(defaultPlayers));
}
function save(){localStorage.setItem("players",JSON.stringify(players));}

let players = load();
let lastTeam1=null,lastTeam2=null;

/* ---------- HELPERS ---------- */
const $=id=>document.getElementById(id);
const parseList=v=>v.split(",").map(x=>x.trim()).filter(Boolean);
const teamTotal=t=>t.reduce((s,p)=>s+(players[p]?players[p].TOTAL:0),0);
const attrSum=(team,attr)=>team.reduce((s,p)=>s+(players[p]?players[p][attr]:0),0);

/* Weighted lexicographic imbalance score (lower = better balanced) */
function imbalanceScore(t1,t2){
  let score=0;
  for(const attr of ATTRS){
    score+=ATTR_WEIGHTS[attr]*Math.abs(attrSum(t1,attr)-attrSum(t2,attr));
  }
  return score;
}

/* All combinations of `k` indices from 0..n-1 */
function combinations(n,k){
  const result=[],combo=[];
  (function build(start){
    if(combo.length===k){result.push(combo.slice());return;}
    for(let i=start;i<n;i++){combo.push(i);build(i+1);combo.pop();}
  })(0);
  return result;
}

/* ---------- MANUAL TEAMS ---------- */
function manualCreateTeams(){
  const t1=parseList($("manualTeam1").value), t2=parseList($("manualTeam2").value);
  if(!t1.length||!t2.length){alert("Both manual teams must have players.");return;}
  displayTeams(t1,t2);
}

/* ---------- AUTO BALANCED TEAMS (exhaustive, position-aware) ---------- */
function updateCounter(){
  $("message").textContent="Selected Players: "+document.querySelectorAll('input[name="player"]:checked').length;
}
function createTeams(){
  const selected=[...document.querySelectorAll('input[name="player"]:checked')].map(c=>c.value);
  if(selected.length<10||selected.length>12){
    $("message").textContent="Pick between 10 and 12 players (currently "+selected.length+").";
    return;
  }

  const n=selected.length;
  const k=Math.floor(n/2);          // Team 1 size (smaller half if odd)

  /* Identify the two WORST players (lowest TOTAL) among the selected group.
     These two must never end up on the same team. */
  const byWorst=[...selected].sort((a,b)=>players[a].TOTAL-players[b].TOTAL);
  const worstA=byWorst[0], worstB=byWorst[1];

  /* Exhaustive search over every possible split (player 0 anchored to Team 1
     so we don't evaluate interchangeable splits twice). */
  let bestScore=Infinity, bestT1=null, bestT2=null;
  let bestScoreRelaxed=Infinity, bestT1Relaxed=null, bestT2Relaxed=null; // fallback only

  combinations(n,k).forEach(idx=>{
    if(!idx.includes(0)) return;     // anchor: player 0 must be in Team 1
    const inT1=new Set(idx);
    const t1=[],t2=[];
    for(let i=0;i<n;i++){ (inT1.has(i)?t1:t2).push(selected[i]); }

    /* HARD RULE 1: the two worst players must be on opposite teams. */
    const aInT1=t1.includes(worstA);
    const bInT1=t1.includes(worstB);
    if(aInT1===bInT1) return;        // both same team → skip

    const score=imbalanceScore(t1,t2);

    /* Track the best position-balanced split ignoring the total cap,
       as a safety fallback in case no split satisfies the ≤2 rule. */
    if(score<bestScoreRelaxed){ bestScoreRelaxed=score; bestT1Relaxed=t1; bestT2Relaxed=t2; }

    /* HARD RULE 2: total-rating difference must be <= 2. */
    const totalDiff=Math.abs(teamTotal(t1)-teamTotal(t2));
    if(totalDiff>2) return;          // exceeds cap → skip

    /* SOFT: among splits passing both hard rules, pick best position balance. */
    if(score<bestScore){ bestScore=score; bestT1=t1; bestT2=t2; }
  });

  /* Use the constrained best; if (rarely) none satisfied the <=2 cap,
     fall back to the best position-balanced split and warn. */
  let t1Final, t2Final, warn="";
  if(bestT1){
    t1Final=bestT1; t2Final=bestT2;
  } else {
    t1Final=bestT1Relaxed; t2Final=bestT2Relaxed;
    warn="No split kept the total difference within 2, so the closest possible was used.";
  }

  t1Final.sort(); t2Final.sort();
  displayTeams(t1Final,t2Final);
  if(warn){ $("results").insertAdjacentHTML("beforeend",`<p style="color:var(--red)">${warn}</p>`); }
}

/* ---------- DISPLAY TEAMS ---------- */
function attrBreakdown(team){
  return ATTRS.map(a=>`${a}: ${attrSum(team,a)}`).join(" · ");
}
function displayTeams(t1,t2){
  lastTeam1=t1;lastTeam2=t2;
  const runDiff=Math.abs(attrSum(t1,"Running")-attrSum(t2,"Running"));
  $("results").innerHTML=`
    <div class="team-block">
      <div class="team-card">
        <h3>Team 1</h3>
        <div>${t1.join(", ")}</div>
        <div class="rating">Rating: ${teamTotal(t1)}</div>
        <div class="breakdown">${attrBreakdown(t1)}</div>
      </div>
      <div class="team-card">
        <h3>Team 2</h3>
        <div>${t2.join(", ")}</div>
        <div class="rating">Rating: ${teamTotal(t2)}</div>
        <div class="breakdown">${attrBreakdown(t2)}</div>
      </div>
    </div>
    <div class="diff">Running difference: ${runDiff} · Total difference: ${Math.abs(teamTotal(t1)-teamTotal(t2))}</div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn" id="copyBtn">Copy Teams</button>
      <span id="copyMsg" class="copy-ok"></span>
    </div>`;
  $("copyBtn").onclick=copyTeams;
}

/* ---------- COPY TEAMS ---------- */
function copyTeams(){
  if(!lastTeam1||!lastTeam2){return;}
  /* Randomly assign a colour to team 1; team 2 gets the opposite. */
  const team1IsRed = Math.random()<0.5;
  const colour1 = team1IsRed ? "Red Team"   : "White Team";
  const colour2 = team1IsRed ? "White Team" : "Red Team";

  const text =
    `${colour1}\n` +
    `${lastTeam1.join(", ")}\n` +
    `vs\n` +
    `${colour2}\n` +
    `${lastTeam2.join(", ")}`;

  const done = ()=>{ const m=$("copyMsg"); if(m){ m.textContent="✓ Copied!"; setTimeout(()=>m.textContent="",2000); } };
  const fail = ()=>{ alert("Couldn't copy automatically. Here are the teams:\n\n"+text); };

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done,fail));
  } else {
    fallbackCopy(text,done,fail);
  }
}
/* Fallback for older browsers / non-secure contexts */
function fallbackCopy(text,done,fail){
  try{
    const ta=document.createElement("textarea");
    ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok=document.execCommand("copy");
    document.body.removeChild(ta);
    ok?done():fail();
  }catch(e){ fail(); }
}

/* ---------- RATING CALCULATOR ---------- */
function calculateTeamRatings(){
  const t1=parseList($("team1Input").value), t2=parseList($("team2Input").value);
  const unknown=[...t1,...t2].filter(p=>!players[p]);
  $("teamRatings").innerHTML=`
    <div class="team-block">
      <div class="team-card"><h3>Team 1</h3><div class="rating">Rating: ${teamTotal(t1)}</div><div class="breakdown">${attrBreakdown(t1)}</div></div>
      <div class="team-card"><h3>Team 2</h3><div class="rating">Rating: ${teamTotal(t2)}</div><div class="breakdown">${attrBreakdown(t2)}</div></div>
    </div>
    ${unknown.length?`<p style="color:var(--red)">Unknown players ignored: ${unknown.join(", ")}</p>`:""}`;
}

/* ---------- EDIT MODAL ---------- */
let editingName=null;
function showPlayerAttributes(name){
  editingName=name;const p=players[name];
  $("playerName").textContent=name;
  $("goalkeeper").value=p.Goalkeeper;$("defender").value=p.Defender;$("midfielder").value=p.Midfielder;
  $("forward").value=p.Forward;$("running").value=p.Running;
  openModal("playerModal");
}
function saveAttributes(){
  const p=players[editingName];
  p.Goalkeeper=clamp($("goalkeeper").value);p.Defender=clamp($("defender").value);
  p.Midfielder=clamp($("midfielder").value);p.Forward=clamp($("forward").value);p.Running=clamp($("running").value);
  p.TOTAL=p.Goalkeeper+p.Defender+p.Midfielder+p.Forward+p.Running;
  save();closeModal("playerModal");renderPlayers();
}
function removePlayer(){
  if(!confirm("Remove "+editingName+"?"))return;
  delete players[editingName];save();closeModal("playerModal");renderPlayers();
}
const clamp=v=>Math.max(0,Math.min(5,Number(v)||0));

/* ---------- ADD PLAYER ---------- */
function addPlayer(){
  const name=$("newPlayerName").value.trim();
  if(!name){alert("Please enter a name.");return;}
  if(players[name]){alert("A player with that name already exists.");return;}
  const g=clamp($("newGoalkeeper").value),d=clamp($("newDefender").value),m=clamp($("newMidfielder").value),
        f=clamp($("newForward").value),r=clamp($("newRunning").value);
  players[name]={Goalkeeper:g,Defender:d,Midfielder:m,Forward:f,Running:r,TOTAL:g+d+m+f+r};
  save();closeModal("addPlayerModal");$("newPlayerName").value="";renderPlayers();
}

/* ---------- RENDER PLAYERS ---------- */
function renderPlayers(){
  const list=$("playerList");list.innerHTML="";
  const sort=$("sortCriteria").value;
  const sorted=Object.keys(players).sort((a,b)=>{
    switch(sort){
      case"nameAsc":return a.localeCompare(b);
      case"nameDesc":return b.localeCompare(a);
      case"ratingAsc":return players[a].TOTAL-players[b].TOTAL;
      case"ratingDesc":return players[b].TOTAL-players[a].TOTAL;
    }
  });
  sorted.forEach(name=>{
    const row=document.createElement("div");row.className="player";
    row.innerHTML=`
      <input type="checkbox" name="player" value="${name}" id="cb_${name}">
      <label class="name" for="cb_${name}">${name}</label>
      <span class="badge">${players[name].TOTAL}</span>
      <button class="icon-btn" title="Edit" data-edit="${name}">✏️</button>`;
    row.querySelector("input").addEventListener("change",updateCounter);
    row.querySelector("[data-edit]").addEventListener("click",()=>showPlayerAttributes(name));
    list.appendChild(row);
  });
  updateCounter();
}

/* ---------- RESTORE ---------- */
function restoreDefaults(){
  if(!confirm("Restore the default player list? This replaces all current players."))return;
  players=normalise(structuredClone(defaultPlayers));save();renderPlayers();
}

/* ---------- EXPORT PLAYER RATINGS ---------- */
function exportPlayerRatings(){
  const names=Object.keys(players);
  if(!names.length){ alert("No players to export."); return; }

  /* Format: "Alfie 2/3/3/5/4, Chris 4/3/4/3/3, ..."  (GK/Def/Mid/Fwd/Run) */
  const text = names.map(name=>{
    const p=players[name];
    return `${name} ${p.Goalkeeper}/${p.Defender}/${p.Midfielder}/${p.Forward}/${p.Running}`;
  }).join(", ");

  const done = ()=>{ const m=$("exportMsg"); if(m){ m.textContent="✓ Copied!"; setTimeout(()=>m.textContent="",2000); } };
  const fail = ()=>{ alert("Couldn't copy automatically. Here are the ratings:\n\n"+text); };

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done,fail));
  } else {
    fallbackCopy(text,done,fail);
  }
}  

/* ---------- MODAL HELPERS ---------- */
function openModal(id){$(id).classList.add("open");}
function closeModal(id){$(id).classList.remove("open");}

/* ---------- WIRE UP EVENTS ---------- */
$("manualBtn").onclick=manualCreateTeams;
$("createBtn").onclick=createTeams;
$("addBtn").onclick=()=>openModal("addPlayerModal");
$("calcBtn").onclick=calculateTeamRatings;
$("saveAttrBtn").onclick=saveAttributes;
$("removeBtn").onclick=removePlayer;
$("addPlayerBtn").onclick=addPlayer;
$("restoreBtn").onclick=restoreDefaults;
$("sortCriteria").onchange=renderPlayers;
$("exportBtn").onclick=exportPlayerRatings;
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>closeModal(b.dataset.close));
document.querySelectorAll(".modal").forEach(m=>m.addEventListener("click",e=>{if(e.target===m)closeModal(m.id);}));

/* ---------- INIT ---------- */
renderPlayers();
</script>
</body>
</html>
